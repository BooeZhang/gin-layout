version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./etc/config.docker.toml:/app/etc/config.toml:ro
    networks:
      - gin-layout

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: gin_layout
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gin-layout

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - gin-layout

volumes:
  mysql_data:

networks:
  gin-layout:
    driver: bridge
